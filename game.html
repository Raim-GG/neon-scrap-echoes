<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>Neon Scrap Echoes</title>\n    <style>\n        body {\n            background-color: #111;\n            color: #fff;\n            font-family: Arial, sans-serif;\n            display: flex;\n            flex-direction: column;\n            align-items: center;\n            justify-content: center;\n            height: 100vh;\n            margin: 0;\n        }\n        .button {\n            background-color: #00ff9f;\n            border: none;\n            color: black;\n            padding: 15px 32px;\n            text-align: center;\n            text-decoration: none;\n            display: inline-block;\n            font-size: 16px;\n            margin: 4px 2px;\n            transition-duration: 0.4s;\n            cursor: pointer;\n            border-radius: 10px;\n        }\n        .button:hover {\n            background-color: #00cc7a;\n        }\n        .modal {\n            display: none;\n            position: fixed;\n            z-index: 1;\n            left: 0;\n            top: 0;\n            width: 100%;\n            height: 100%;\n            overflow: auto;\n            background-color: rgb(0,0,0);\n            background-color: rgba(0,0,0,0.4);\n            padding-top: 60px;\n        }\n        .modal-content {\n            background-color: #fefefe;\n            margin: 5% auto;\n            padding: 20px;\n            border: 1px solid #888;\n            width: 80%;\n        }\n        @media (max-width: 600px) {\n            body {\n                font-size: 14px;\n            }\n        }\n    </style>\n</head>\n<body>\n    <h1>Neon Scrap Echoes</h1>\n    <div id=\"gameState\">Click Amount: <span id=\"clickAmount\">0</span></div>\n    <button class=\"button\" id=\"clickButton\">Click Me!</button>\n    <div id=\"modal\" class=\"modal\">\n        <div class=\"modal-content\">\n            <span id=\"closeModal\" style=\"color: red; cursor: pointer;\">&times;</span>\n            <p>Upgrade Tree</p>\n            <!-- Add Upgrade Options Here -->\n        </div>\n    </div>\n    <script>\n        let clickCount = 0;\n        const clickButton = document.getElementById(\"clickButton\");\n        const clickAmount = document.getElementById(\"clickAmount\");\n        const modal = document.getElementById(\"modal\");\n        const closeModal = document.getElementById(\"closeModal\");\n\n        clickButton.addEventListener(\"click\", function() {\n            clickCount++;\n            clickAmount.innerText = clickCount;\n        });\n\n        closeModal.onclick = function() {\n            modal.style.display = \"none\";\n        };\n\n        window.onclick = function(event) {\n            if (event.target == modal) {\n                modal.style.display = \"none\";\n            }\n        };\n    </script>\n</body>\n</html>\n
